[build]
  command = "npm run build"
  publish = "build"
  environment = { VITE_API_URL = "https://symposium-veyj.onrender.com/api" }

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"